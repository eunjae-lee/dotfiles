settings:
  config_editor: /opt/homebrew/bin/zed
  open_in:
    - name: Zed
      command: /opt/homebrew/bin/zed

projects:
  - id: cal
    name: Cal
    path: /Users/eunjae/workspace/cal
    worktree: true
    setup: |
      cp /Users/eunjae/workspace/cal/.env .env

      DB_NAME=$GLOWCAT_INSTANCE_ID
      createdb -h localhost -p 5432 -U postgres "$DB_NAME"
      echo "Created database: $DB_NAME"

      sed -i '' -E "s|^(DATABASE_URL=\"postgresql://[^/]+/)[^\"]+\"|\1${DB_NAME}\"|" .env

      sed -i '' -E "s|^(DATABASE_DIRECT_URL=\"postgresql://[^/]+/)[^\"]+\"|\1${DB_NAME}\"|" .env

      sed -i.bak "s/:3000/:${GLOWCAT_PORT}/g" .env

      yarn install
      yarn workspace @calcom/prisma db-deploy
      yarn workspace @calcom/prisma db-migrate
      yarn workspace @calcom/prisma db-seed
    cleanup: |
      DB_NAME=$GLOWCAT_INSTANCE_ID

      dropdb -U postgres -h localhost -p 5432 "$DB_NAME"
      echo "Deleted database: $DB_NAME"
    urls:
      - label: Web
        url: http://app.cal.local:$GLOWCAT_PORT
    worktree_pools: 3
    workflows:
      - name: Blank
      - name: Existing PR
        branch_from: pr_url
        inputs:
          - name: pr_url
            label: PR URL
            required: true
        setup: |
          yarn install
          yarn prisma migrate dev
      - name: Review
        branch_from: pr_url
        inputs:
          - name: pr_url
            label: PR URL
            required: true
        setup: |
          yarn install
          yarn prisma migrate dev
    tabs:
      - name: Claude
        command: |
          CLAUDE_SESSION_ID=$GLOWCAT_INSTANCE_UUID
          SESSION_EXISTS=$(setopt +o nomatch 2>/dev/null; ls ~/.claude/projects/*/${CLAUDE_SESSION_ID}.jsonl 2>/dev/null)
          if [ "$GLOWCAT_WORKFLOW_NAME" = "Review" ]; then
            if [ -n "$SESSION_EXISTS" ]; then
              claude --resume $CLAUDE_SESSION_ID
            else
              echo "/review-pr" | claude --session-id $CLAUDE_SESSION_ID
            fi
          else
            if [ -n "$SESSION_EXISTS" ]; then
              claude --resume $CLAUDE_SESSION_ID
            else
              claude --session-id $CLAUDE_SESSION_ID
            fi
          fi
      - name: Git
        command: "lazygit"
      - name: Dev Web
        url: "http://app.cal.local:$GLOWCAT_PORT/event-types"
        wait_for: "http://app.cal.local:$GLOWCAT_PORT/event-types"
      - name: Dev Server
        command: "yarn workspace @calcom/web dev -p $GLOWCAT_PORT"
        output_file: "/Users/eunjae/Downloads/dev-${GLOWCAT_PORT}.log"
      - name: psql
        command: 'source .env && psql "$DATABASE_URL"'
        suspended: true
      - name: Extra stuff
        split: horizontal
        panes:
          - split: vertical
            panes:
              - name: Stripe Webhook Listener
                command: "/opt/homebrew/bin/stripe listen --forward-to http://localhost:${GLOWCAT_PORT}/api/stripe/webhook"
                suspended: true
              - name: Trigger.dev
                command: "(cd ./packages/features && npx trigger.dev@latest dev --analyze)"
                suspended: true
          - split: vertical
            panes:
              - name: Email
                command: yarn workspace @calcom/emails dx
                suspended: true
              - name: Empty
                command:
      - name: Reset DB
        command: "yarn prisma migrate reset -f && yarn workspace @calcom/prisma seed-insights"
        suspended: true
      - name: Playground
